set-option -sa terminal-overrides ",xterm*:Tc"
set -g base-index 1
set-option -g renumber-windows on

# Keybindings

# Prefix: Ctrl+s
set -g prefix C-s

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar
set -g mouse on
setw -g mode-keys vi
set -g status-position top
set -g status on
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-interval 5

# Window list
set -g status-left ""
set -g status-right "#[fg=#cba6f7,bg=#1e1e2e,bold] #H  #[fg=#a6adc8]%d %b %Y  #[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "
set -g status-right-length 60
set -g status-justify left

set -g window-status-format         "#[fg=#6c7086,nobold] #I #W "
set -g window-status-current-format "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa,bold] #I #W #[fg=#89b4fa,bg=#1e1e2e,nobold]"
set -g window-status-style          "default"
set -g window-status-current-style  "default"
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Tmux sessionizer (prefix+f)
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Toggle status bar with prefix+y
bind y if-shell '[ "$(tmux show-option -gv status)" != "off" ]' \
    'set -g status off' \
    'set -g status on'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
