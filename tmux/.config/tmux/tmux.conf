# =============================================================================
# General
# =============================================================================

set-option -sa terminal-overrides ",xterm*:Tc"
set -g base-index 1
set-option -g renumber-windows on

# =============================================================================
# Keybindings
# =============================================================================

# Prefix: Ctrl+s
set -g prefix C-s

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# Status bar
# =============================================================================

set -g status off
set -g mouse on
setw -g mode-keys vi
set -g status-position bottom
set -g status-style "bg=default,fg=#cdd6f4"
set -g status-interval 10

# Window list
set -g status-left ""
set -g status-right "#[fg=#cba6f7,bold] %H:%M "
set -g status-right-length 20
set -g status-justify left

set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "
set -g window-status-style          "fg=#6c7086,nobold"
set -g window-status-current-style  "bg=#cba6f7,fg=#1e1e2e,bold"
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Toggle status bar with prefix+y
bind y if-shell '[ "$(tmux show-option -gv status)" != "off" ]' \
    'set -g status off' \
    'set -g status on'

# =============================================================================
# Plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
