# =============================================================================
# General
# =============================================================================

set-option -sa terminal-overrides ",xterm*:Tc"
set -g base-index 1
set-option -g renumber-windows on

# =============================================================================
# Keybindings
# =============================================================================

# Prefix: Ctrl+s
set -g prefix C-s

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# Status bar
# =============================================================================

set -g status off
set -g 'status-format[1]' ''
set -g status-position top
set -g status-bg default
set -g status-style bg=default

# Toggle status bar with prefix+y
bind y if-shell '[ "$(tmux show-option -gv status)" != "off" ]' \
    'set -g status off' \
    'set -g status on'

# =============================================================================
# Plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'

# Dracula theme
set -g @dracula-plugins "cpu-usage gpu-usage ram-usage"
set -g @dracula-show-powerline false
set -g @dracula-transparent-powerline-bg true
set -g @dracula-cpu-usage-colors "default white"
set -g @dracula-gpu-usage-colors "default white"
set -g @dracula-ram-usage-colors "default white"
set -g @dracula-colors "
  white='#f8f8f2'
  gray='#44475a'
  dark_gray='default'
  light_purple='default'
  dark_purple='default'
  cyan='default'
  green='default'
  orange='default'
  red='default'
  pink='default'
  yellow='default'
"

# Active window style (Dracula purple)
set -g window-status-current-style "bg=#bd93f9,fg=#282a36,bold"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
